version: "3.8"

services:
  postgres:
    image: SEU_USUARIO/postgres-pgbackrest:15
    command: >
      postgres
      -c max_connections=200
      -c archive_mode=on
      -c archive_command='pgbackrest --stanza=main archive-push %p'
      -c archive_timeout=60
      -c wal_level=replica
    ports:
      - 5432:5432
    environment:
      - POSTGRES_PASSWORD=SUA_SENHA
      # Cron em UTC. BRT = UTC-3: para rodar às 01h local use 04h UTC (padrão abaixo).
      - PG_FULL_CRON=0 4 * * 0
      - PG_INCR_CRON=0 4 * * 1-6
      - PG_CHECK_CRON=0 */12 * * *
    networks:
      - app_network
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - pg_extensions:/usr/share/postgresql/15/extension
      - pg_libs:/usr/lib/postgresql/15/lib
      - pgbackrest_log:/var/log/pgbackrest
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: '2'
          memory: 4096M

volumes:
  postgres_data:
    external: true
  pg_extensions:
    external: true
  pg_libs:
    external: true
  pgbackrest_log:
    external: true

networks:
  app_network:
    external: true
