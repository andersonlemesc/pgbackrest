[global]
# Repositorio no MinIO (compativel com S3)
repo1-type=s3
repo1-path=/repo
repo1-s3-bucket=SEU_BUCKET
repo1-s3-endpoint=SEU_ENDPOINT_MINIO
repo1-s3-region=us-east-1
repo1-s3-key=SUA_ACCESS_KEY
repo1-s3-key-secret=SUA_SECRET_KEY

# MinIO nao usa SSL por padrao em redes internas
# Mude para y se seu MinIO tiver SSL configurado
repo1-s3-uri-style=path
repo1-storage-verify-tls=n

# Compressao e paralelismo
compress-type=lz4
compress-level=6
process-max=2

# Retencao: mantém os ultimos 7 backups full (~49 dias)
repo1-retention-full=7

# Logs
log-level-console=info
log-level-file=detail
log-path=/var/log/pgbackrest

[global:archive-push]
compress-level=3

# Stanza principal - representa o cluster Postgres
# Todos os databases ficam dentro de um unico cluster
[main]
pg1-path=/var/lib/postgresql/data
pg1-user=postgres
pg1-port=5432
